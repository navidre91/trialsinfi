name: Weekly Trial Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

concurrency:
  group: weekly-trial-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: knowledgecenter/production_ready_pipeline/requirements.txt

      - name: Install pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r knowledgecenter/production_ready_pipeline/requirements.txt

      - name: Generate website catalog
        run: |
          mkdir -p build
          python knowledgecenter/production_ready_pipeline/gu_pipeline.py \
            --skip-excel \
            --skip-updates \
            --website-catalog-out build/website_trials.json

      - name: Upload generated catalog as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-trials-catalog
          path: build/website_trials.json
          if-no-files-found: error

      - name: Configure SSH for Namecheap
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.NAMECHEAP_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.NAMECHEAP_PORT }}" "${{ secrets.NAMECHEAP_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload catalog to Namecheap
        run: |
          scp -i ~/.ssh/id_rsa -P "${{ secrets.NAMECHEAP_PORT }}" \
            build/website_trials.json \
            "${{ secrets.NAMECHEAP_USER }}@${{ secrets.NAMECHEAP_HOST }}:~/website_trials.json"

      - name: Import catalog on server
        run: |
          ssh -i ~/.ssh/id_rsa -p "${{ secrets.NAMECHEAP_PORT }}" \
            "${{ secrets.NAMECHEAP_USER }}@${{ secrets.NAMECHEAP_HOST }}" \
            "php '${{ secrets.REMOTE_APP_ROOT }}/scripts/import_website_catalog.php' ~/website_trials.json && rm -f ~/website_trials.json"
