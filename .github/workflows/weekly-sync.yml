name: Weekly Trial Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

concurrency:
  group: weekly-trial-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: knowledgecenter/production_ready_pipeline/requirements.txt

      - name: Install pipeline dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r knowledgecenter/production_ready_pipeline/requirements.txt

      - name: Generate website catalog
        run: |
          mkdir -p build
          python knowledgecenter/production_ready_pipeline/gu_pipeline.py \
            --skip-excel \
            --skip-updates \
            --website-catalog-out build/website_trials.json

      - name: Upload generated catalog as workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: website-trials-catalog
          path: build/website_trials.json
          if-no-files-found: error

      - name: Configure SSH for Namecheap
        env:
          NAMECHEAP_SSH_KEY: ${{ secrets.NAMECHEAP_SSH_KEY }}
          NAMECHEAP_SSH_KEY_B64: ${{ secrets.NAMECHEAP_SSH_KEY_B64 }}
        run: |
          install -m 700 -d ~/.ssh
          if [ -n "${NAMECHEAP_SSH_KEY_B64}" ]; then
            printf '%s' "${NAMECHEAP_SSH_KEY_B64}" | base64 -d > ~/.ssh/id_rsa
          else
            printf '%s' "${NAMECHEAP_SSH_KEY}" | tr -d '\r' > ~/.ssh/id_rsa
          fi
          chmod 600 ~/.ssh/id_rsa
          ssh-keygen -y -f ~/.ssh/id_rsa > /dev/null
          cat > ~/.ssh/config <<EOF
          Host namecheap-shared
            HostName ${{ secrets.NAMECHEAP_HOST }}
            User ${{ secrets.NAMECHEAP_USER }}
            Port ${{ secrets.NAMECHEAP_PORT }}
            IdentityFile ~/.ssh/id_rsa
            IdentitiesOnly yes
            HostKeyAlgorithms +ssh-rsa
            PubkeyAcceptedAlgorithms +ssh-rsa
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config
          ssh-keyscan -t rsa -p "${{ secrets.NAMECHEAP_PORT }}" "${{ secrets.NAMECHEAP_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connectivity
        run: |
          ssh namecheap-shared "hostname -f && php -v | head -n 1"

      - name: Upload catalog to Namecheap
        run: |
          scp build/website_trials.json namecheap-shared:~/website_trials.json

      - name: Import catalog on server
        run: |
          ssh namecheap-shared \
            "php '${{ secrets.REMOTE_APP_ROOT }}/scripts/import_website_catalog.php' ~/website_trials.json && rm -f ~/website_trials.json"
